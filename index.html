<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agente de Pedidos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --bg: #0f0f0f;
  --bg2: #161616;
  --bg3: #1e1e1e;
  --border: #2a2a2a;
  --border2: #333;
  --text: #e8e6e1;
  --text2: #8a8880;
  --text3: #555;
  --accent: #c8f060;
  --accent2: #9abe40;
  --danger: #f06060;
  --warn: #f0b060;
  --ok: #60c8a0;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }

.app { display: grid; grid-template-columns: 260px 1fr; height: 100vh; }

/* Sidebar */
.sidebar { background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.sidebar-header { padding: 20px 16px 16px; border-bottom: 1px solid var(--border); }
.logo { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
.logo-sub { font-size: 11px; color: var(--text3); font-family: var(--mono); }
.sidebar-section { padding: 12px 16px 8px; font-size: 10px; font-family: var(--mono); color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; }
.loja-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; }
.loja-list::-webkit-scrollbar { width: 3px; }
.loja-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.loja-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; transition: background .15s; margin-bottom: 2px; }
.loja-item:hover { background: var(--bg3); }
.loja-item.active { background: var(--bg3); border-left: 2px solid var(--accent); padding-left: 8px; }
.loja-name { font-size: 12px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
.loja-meta { font-size: 10px; font-family: var(--mono); color: var(--text3); }
.loja-rede { display: inline-block; font-size: 9px; font-family: var(--mono); padding: 1px 6px; border-radius: 3px; margin-top: 3px; }
.rede-M { background: #1a2e1a; color: #60c860; }
.rede-S { background: #1a1a2e; color: #6060c8; }

/* Busca sidebar */
.sidebar-search { padding: 8px; }
.sidebar-search input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border2);
  border-radius: 5px; padding: 6px 10px; color: var(--text);
  font-family: var(--mono); font-size: 11px; outline: none;
}
.sidebar-search input::placeholder { color: var(--text3); }
.sidebar-search input:focus { border-color: var(--accent); }

.sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text3); font-family: var(--mono); }
.status-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--ok); margin-right: 6px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* Main */
.main { display: flex; flex-direction: column; overflow: hidden; }
.topbar { padding: 14px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg2); }
.topbar-title { font-size: 13px; font-weight: 500; color: var(--text); }
.topbar-sub { font-size: 11px; color: var(--text3); font-family: var(--mono); margin-top: 1px; }
.topbar-actions { display: flex; gap: 8px; }
.btn-icon { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); padding: 5px 10px; border-radius: 5px; cursor: pointer; font-size: 11px; font-family: var(--mono); transition: all .15s; }
.btn-icon:hover { border-color: var(--accent); color: var(--accent); }

/* Messages */
.messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

.msg { display: flex; gap: 12px; max-width: 820px; }
.msg.user { flex-direction: row-reverse; align-self: flex-end; }
.msg-avatar { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-family: var(--mono); flex-shrink: 0; }
.msg.agent .msg-avatar { background: var(--accent); color: #0f0f0f; font-weight: 500; }
.msg.user .msg-avatar { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); }
.msg-body { flex: 1; }
.msg-bubble { padding: 12px 14px; border-radius: 8px; line-height: 1.65; font-size: 13.5px; }
.msg.agent .msg-bubble { background: var(--bg2); border: 1px solid var(--border); color: var(--text); }
.msg.user .msg-bubble { background: var(--bg3); border: 1px solid var(--border2); color: var(--text2); }
.msg-time { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 4px; padding: 0 2px; }
.msg.user .msg-time { text-align: right; }

/* Pedido card */
.pedido-card { background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; overflow: hidden; margin-top: 10px; }
.pedido-card-header { padding: 10px 14px; background: #1a2010; border-bottom: 1px solid var(--border2); display: flex; align-items: center; justify-content: space-between; }
.pedido-card-title { font-family: var(--mono); font-size: 11px; color: var(--accent); }
.pedido-card-status { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border-radius: 3px; }
.status-ok { background: #0d2010; color: var(--ok); border: 1px solid #1a4020; }
.status-erro { background: #2e0d0d; color: var(--danger); border: 1px solid #4a1a1a; }
.status-proc { background: #1a1a0d; color: var(--warn); border: 1px solid #3a3010; }
.pedido-card-body { padding: 12px 14px; }
.pedido-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
.pedido-row:last-child { border-bottom: none; }
.pedido-label { color: var(--text3); font-family: var(--mono); font-size: 11px; }
.pedido-value { color: var(--text); font-weight: 500; }
.pedido-num { font-family: var(--mono); color: var(--accent); }
.item-row { display: flex; gap: 8px; align-items: center; padding: 4px 0; font-size: 12px; border-bottom: 1px solid var(--border); }
.item-row:last-child { border-bottom: none; }
.item-cod { font-family: var(--mono); color: var(--text3); font-size: 10px; min-width: 64px; }
.item-name { flex: 1; color: var(--text2); }
.item-qty { font-family: var(--mono); font-size: 11px; padding: 1px 7px; border-radius: 3px; background: var(--bg3); color: var(--accent); white-space: nowrap; }
.item-skip { color: var(--text3); text-decoration: line-through; }

/* Typing */
.typing { display: flex; gap: 4px; align-items: center; padding: 12px 14px; }
.typing span { width: 6px; height: 6px; background: var(--text3); border-radius: 50%; animation: blink 1.2s infinite; }
.typing span:nth-child(2) { animation-delay: .2s; }
.typing span:nth-child(3) { animation-delay: .4s; }
@keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

/* Input */
.input-area { padding: 16px 24px 20px; border-top: 1px solid var(--border); background: var(--bg2); }
.input-wrap { display: flex; gap: 10px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 8px; padding: 10px 12px; transition: border-color .2s; }
.input-wrap:focus-within { border-color: var(--accent); }
.msg-input { flex: 1; background: none; border: none; outline: none; color: var(--text); font-family: var(--sans); font-size: 13.5px; resize: none; max-height: 160px; min-height: 20px; line-height: 1.5; }
.msg-input::placeholder { color: var(--text3); }
.send-btn { background: var(--accent); border: none; border-radius: 5px; width: 32px; height: 32px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; align-self: flex-end; flex-shrink: 0; }
.send-btn:hover { background: var(--accent2); }
.send-btn:disabled { background: var(--bg); cursor: not-allowed; }
.input-hints { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
.hint-chip { font-size: 11px; font-family: var(--mono); padding: 3px 9px; border-radius: 4px; border: 1px solid var(--border2); color: var(--text3); cursor: pointer; transition: all .15s; background: none; }
.hint-chip:hover { border-color: var(--accent); color: var(--accent); }

/* Upload */
.upload-bar { display: none; align-items: center; gap: 8px; padding: 6px 12px; background: var(--bg3); border: 1px solid var(--border2); border-radius: 6px; margin-bottom: 8px; font-size: 11px; color: var(--text2); font-family: var(--mono); }
.upload-bar.show { display: flex; }
.upload-remove { cursor: pointer; color: var(--danger); margin-left: auto; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.7); z-index: 100; align-items: center; justify-content: center; }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 10px; padding: 24px; width: 500px; max-width: 90vw; max-height: 80vh; overflow-y: auto; }
.modal-title { font-family: var(--mono); font-size: 12px; color: var(--accent); margin-bottom: 16px; }
.modal-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.modal-table th { text-align: left; padding: 6px 8px; border-bottom: 1px solid var(--border2); color: var(--text3); font-family: var(--mono); font-size: 10px; font-weight: 400; }
.modal-table td { padding: 7px 8px; border-bottom: 1px solid var(--border); color: var(--text); font-family: var(--mono); font-size: 11px; }
.modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 16px; }
.btn-cancel { background: none; border: 1px solid var(--border2); color: var(--text2); padding: 7px 14px; border-radius: 5px; cursor: pointer; font-size: 12px; font-family: var(--mono); }
.btn-confirm { background: var(--accent); border: none; color: #0f0f0f; padding: 7px 14px; border-radius: 5px; cursor: pointer; font-size: 12px; font-family: var(--mono); font-weight: 500; }

/* Loading */
.loading-screen { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px; z-index: 200; }
.loading-screen.hidden { display: none; }
.loading-text { font-family: var(--mono); font-size: 12px; color: var(--text3); }
.loading-bar { width: 160px; height: 2px; background: var(--border); border-radius: 2px; overflow: hidden; }
.loading-fill { height: 100%; background: var(--accent); animation: load 1.2s ease-in-out infinite; }
@keyframes load { 0%{width:0;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0;margin-left:100%} }

@media (max-width: 640px) {
  .app { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}
</style>
</head>
<body>

<!-- Loading -->
<div class="loading-screen" id="loadingScreen">
  <div class="logo" style="font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:.08em">▸ AGENTE PEDIDOS</div>
  <div class="loading-bar"><div class="loading-fill"></div></div>
  <div class="loading-text" id="loadingText">carregando lojas...</div>
</div>

<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">▸ Agente Pedidos</div>
      <div class="logo-sub" id="lojaCount">carregando...</div>
    </div>
    <div class="sidebar-search">
      <input type="text" id="buscaLoja" placeholder="buscar loja..." oninput="filtrarLojas(this.value)">
    </div>
    <div class="sidebar-section">Lojas</div>
    <div class="loja-list" id="lojaList"></div>
    <div class="sidebar-footer">
      <span class="status-dot"></span><span id="statusText">carregando...</span>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">Chat de Pedidos</div>
        <div class="topbar-sub">Cole o pedido do WhatsApp ou descreva</div>
      </div>
      <div class="topbar-actions">
        <button class="btn-icon" onclick="showHistorico()">histórico</button>
        <button class="btn-icon" onclick="novoPedido()">+ novo pedido</button>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="input-area">
      <div class="upload-bar" id="uploadBar">
        <span id="uploadName">—</span>
        <span class="upload-remove" onclick="removeUpload()">✕ remover</span>
      </div>
      <div class="input-wrap">
        <textarea class="msg-input" id="msgInput"
          placeholder="Cole o pedido do WhatsApp aqui..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"></textarea>
        <label style="cursor:pointer;align-self:flex-end;margin-bottom:6px;" title="Anexar arquivo">
          <input type="file" id="fileInput" style="display:none" accept=".xlsx,.xls,.pdf,.png,.jpg" onchange="handleFile(event)">
          <svg width="16" height="16" fill="none" stroke="var(--text3)" stroke-width="1.5" viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </label>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-hints">
        <button class="hint-chip" onclick="useHint('Quais lojas da rede Hirota estão cadastradas?')">lojas por rede</button>
        <button class="hint-chip" onclick="useHint('Mostrar histórico de pedidos')">histórico</button>
      </div>
    </div>
  </main>
</div>

<!-- Modal histórico -->
<div class="modal-overlay" id="modalHistorico">
  <div class="modal">
    <div class="modal-title">// histórico de pedidos</div>
    <table class="modal-table">
      <thead><tr><th>Nº Pedido</th><th>Data</th><th>Loja</th><th>Sistema</th><th>Itens</th></tr></thead>
      <tbody id="historicoBody"></tbody>
    </table>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal('modalHistorico')">fechar</button>
      <button class="btn-confirm" onclick="exportarHistorico()">exportar CSV</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const CONFIG = {
  // ⚠️  Cole aqui a URL do seu Cloudflare Worker após o deploy
  WORKER_URL: "https://soft-thunder-fb6c.lunafelipe407.workers.dev",

  // URL do lojas.json — quando publicar no GitHub Pages, deixe como "./lojas.json"
  LOJAS_URL: "./lojas.json"
};

// ─── ESTADO ───────────────────────────────────────────────────────────────────
let LOJAS = [];
let historico = JSON.parse(localStorage.getItem('pedidos_historico') || '[]');
let uploadedFile = null;
let conversationHistory = [];
let isProcessing = false;
let lojasFiltradas = [];

// ─── CARREGA LOJAS ────────────────────────────────────────────────────────────
async function carregarLojas() {
  try {
    document.getElementById('loadingText').textContent = 'carregando lojas...';
    const resp = await fetch(CONFIG.LOJAS_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    LOJAS = await resp.json();
    lojasFiltradas = LOJAS;

    document.getElementById('lojaCount').textContent =
      `${LOJAS.length} lojas · ${LOJAS.filter(l=>l.sistema==='Mercadão').length}M + ${LOJAS.filter(l=>l.sistema==='Susan').length}S`;
    document.getElementById('statusText').textContent = 'agente online';

    renderSidebar(LOJAS);
    document.getElementById('loadingScreen').classList.add('hidden');
    addMsg('agent', `Pronto! <strong>${LOJAS.length} lojas</strong> carregadas — ${LOJAS.filter(l=>l.sistema==='Mercadão').length} Mercadão e ${LOJAS.filter(l=>l.sistema==='Susan').length} Susan.<br><br>Cole o pedido do WhatsApp aqui que eu identifico a loja, mapejo os produtos e gero o pedido.`);
  } catch (err) {
    document.getElementById('loadingText').textContent = 'erro ao carregar — verifique o lojas.json';
    console.error(err);
    setTimeout(() => {
      document.getElementById('loadingScreen').classList.add('hidden');
      addMsg('agent', `⚠ Não consegui carregar o <code>lojas.json</code>. Verifique se o arquivo está na mesma pasta que o <code>index.html</code>.<br><br>Erro: ${err.message}`);
    }, 1500);
  }
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function renderSidebar(lojas) {
  const list = document.getElementById('lojaList');
  if (lojas.length === 0) {
    list.innerHTML = '<div style="padding:12px;font-size:11px;color:var(--text3);font-family:var(--mono)">nenhuma loja encontrada</div>';
    return;
  }
  list.innerHTML = lojas.map(l => `
    <div class="loja-item" onclick="selecionarLoja('${l.cnpj.replace(/'/g,"\\'")}')">
      <div class="loja-name">${l.nome}</div>
      <div class="loja-meta">${l.cnpj}</div>
      <span class="loja-rede rede-${l.sistema === 'Mercadão' ? 'M' : 'S'}">${l.rede} · ${l.sistema}</span>
    </div>
  `).join('');
}

function filtrarLojas(termo) {
  if (!termo.trim()) {
    lojasFiltradas = LOJAS;
  } else {
    const t = termo.toLowerCase();
    lojasFiltradas = LOJAS.filter(l =>
      l.nome.toLowerCase().includes(t) ||
      l.cnpj.includes(t) ||
      l.rede.toLowerCase().includes(t)
    );
  }
  renderSidebar(lojasFiltradas);
}

function selecionarLoja(cnpj) {
  document.querySelectorAll('.loja-item').forEach(el => el.classList.remove('active'));
  event.currentTarget.classList.add('active');
  const loja = LOJAS.find(l => l.cnpj === cnpj);
  if (!loja) return;
  const input = document.getElementById('msgInput');
  input.value = `Pedido ${loja.nome}:\n`;
  input.focus();
  autoResize(input);
}

// ─── MENSAGENS ────────────────────────────────────────────────────────────────
function agora() {
  return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
}

function addMsg(role, content, extraHtml = '') {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'agent' ? 'AG' : 'VC'}</div>
    <div class="msg-body">
      <div class="msg-bubble">${content}${extraHtml}</div>
      <div class="msg-time">${agora()}</div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg agent';
  div.id = 'typingIndicator';
  div.innerHTML = `
    <div class="msg-avatar">AG</div>
    <div class="msg-body">
      <div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>
    </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typingIndicator');
  if (t) t.remove();
}

// ─── SYSTEM PROMPT ────────────────────────────────────────────────────────────
function buildSystemPrompt() {
  // Lojas sem produtos no summary (evita payload gigante)
  const lojasSummary = LOJAS.map(l =>
    `- ${l.nome} | CNPJ: ${l.cnpj} | Rede: ${l.rede} | Sistema: ${l.sistema}`
  ).join('\n');

  // Catálogo único por sistema (sem repetir para cada loja)
  const uniq = (arr) => [...new Map(arr.map(p => [p.codigo, p])).values()];
  const fmt = (prods) => prods.map(p => p.codigo + '=' + p.descricao).join(', ');

  const produtosMercadao = fmt(uniq(LOJAS.filter(l => l.sistema === 'Mercadão').flatMap(l => l.produtos)));
  const produtosSusan    = fmt(uniq(LOJAS.filter(l => l.sistema === 'Susan').flatMap(l => l.produtos)));

  return `Você é um agente especializado em processar pedidos de supermercado/distribuição recebidos via WhatsApp. Sua função é interpretar pedidos em texto livre, identificar a loja, mapear cada produto para seu código e retornar um JSON estruturado.

LOJAS CADASTRADAS:
${lojasSummary}

CATÁLOGO SISTEMA MERCADÃO:
${produtosMercadao}

CATÁLOGO SISTEMA SUSAN:
${produtosSusan}

═══════════════════════════════════
COMO INTERPRETAR O FORMATO WHATSAPP
═══════════════════════════════════

IDENTIFICAÇÃO DA LOJA:
- A loja geralmente aparece na primeira linha, após "Pedido" ex: "Pedido Hirota vigário"
- Use busca parcial e fuzzy: "Hirota vigário" → busque loja da rede HIROTA cujo nome contenha "vigário" ou variações
- Se houver ambiguidade, escolha a mais provável e informe na resposta

FORMATO DOS ITENS (variações comuns):
- "Uva passa preta 10kg" → produto + quantidade em kg
- "5 caixas de X" ou "1 caixa de X" → quantidade + unidade + produto
- "1 saquinho", "1 caixa de pote", "1 potinho" → item sem produto claro, marque como observação
- Quantidade pode vir antes ou depois: "10kg Aveia" ou "Aveia 10kg"

UNIDADES:
- "kg" → use o número como quantidade (10kg → quantidade: 10, unidade: "kg")
- "caixa", "cx" → quantidade em caixas
- "saquinho", "pote", "potinho" → quantidade unitária
- Decimais com ponto ou vírgula: "2.888 kg" ou "2,888 kg" → 2.888

ITENS DE TROCA / DEVOLUÇÃO:
- Linhas com "Troca" ou "troca" são DEVOLUÇÕES, não pedidos
- Ex: "Troca damasco 2.888 kg" → devolução de 2.888 kg de damasco
- Marque com status "troca" no JSON

MAPEAMENTO DE PRODUTO:
- Faça busca por similaridade: "Uva passa preta" → "UVA PASSA PRETA"
- "Flor de hibisco" → "FLOR DE HIBISCO"
- "Bicarbonato de sódio" → "BICARBONATO"
- "Lemon pepper" → "LEMON PEPPER KG" (prefira versão KG quando houver)
- "Aveia em flocos" → "AVEIA EM FLOCOS KG"
- "Semente de chia" → "SEMENTE DE CHIA"
- Se encontrar mais de um similar, escolha o mais específico

ITENS SEM CORRESPONDÊNCIA:
- "1 caixa de pote", "1 saquinho", "1 potinho" → status "observacao", código null
- Produto não encontrado no catálogo → status "nao_encontrado"

═══════════════════════════
FORMATO JSON DE RESPOSTA
═══════════════════════════

Sempre que receber um pedido, retorne o JSON entre <PEDIDO_JSON> e </PEDIDO_JSON>, seguido de um resumo em texto.

{
  "numero_pedido": "PED-20250427-0001",
  "data": "27/04/2025",
  "hora": "14:30",
  "loja": { "nome": "LOJA XX ...", "cnpj": "...", "sistema": "Mercadão" },
  "itens": [
    { "codigo": "101",  "descricao": "UVA PASSA PRETA",     "quantidade": 10,    "unidade": "kg", "status": "ok" },
    { "codigo": "563",  "descricao": "FLOR DE HIBISCO",     "quantidade": 5,     "unidade": "kg", "status": "ok" },
    { "codigo": "96",   "descricao": "DAMASCO TURCO DOCE",  "quantidade": 2.888, "unidade": "kg", "status": "troca", "motivo": "devolução" },
    { "codigo": null,   "descricao": "1 caixa de pote",     "quantidade": 1,     "unidade": "un", "status": "observacao", "motivo": "sem produto no catálogo" }
  ],
  "total_itens": 4,
  "itens_ok": 2,
  "itens_troca": 1,
  "itens_observacao": 1,
  "itens_ignorados": 0
}

Para perguntas sobre lojas ou produtos, responda em texto diretamente.
Use português brasileiro. Seja objetivo e preciso.`;
}

// ─── AGENTE ───────────────────────────────────────────────────────────────────
async function callAgent(userMessage) {
  conversationHistory.push({ role: "user", content: userMessage });

  const payload = {
    system: buildSystemPrompt(),
    messages: conversationHistory
  };

  const resp = await fetch(CONFIG.WORKER_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload)
  });

  const data = await resp.json();

  if (!resp.ok) {
    const detalhe = data?.error?.message || data?.error || JSON.stringify(data).slice(0, 300);
    throw new Error(`Worker ${resp.status}: ${detalhe}`);
  }

  const text = data.content?.[0]?.text || "Não consegui processar.";
  conversationHistory.push({ role: "assistant", content: text });
  return text;
}

// ─── RENDER PEDIDO ────────────────────────────────────────────────────────────
function renderPedidoCard(pedido) {
  const temProblemas = (pedido.itens_ignorados || 0) > 0 || (pedido.itens_observacao || 0) > 0;
  const statusClass = temProblemas ? 'status-proc' : 'status-ok';
  const statusText  = temProblemas
    ? `⚠ ${pedido.itens_ignorados||0} ignorado(s) · ${pedido.itens_observacao||0} obs.`
    : '✓ processado';

  const itensOk    = pedido.itens.filter(i => i.status === 'ok');
  const itensTroca = pedido.itens.filter(i => i.status === 'troca');
  const itensObs   = pedido.itens.filter(i => ['observacao','nao_encontrado','ignorado'].includes(i.status));

  const linha = (item, cor) => `
    <div class="item-row">
      <span class="item-cod" style="color:${cor||'var(--text3)'}">${item.codigo||'—'}</span>
      <span class="item-name">${item.descricao}</span>
      <span class="item-qty">${item.quantidade}${item.unidade ? ' '+item.unidade : ''}</span>
    </div>`;

  const secTroca = itensTroca.length ? `
    <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">
      <div style="font-size:10px;font-family:var(--mono);color:var(--warn);margin-bottom:4px">↩ TROCAS / DEVOLUÇÕES</div>
      ${itensTroca.map(i => linha(i,'var(--warn)')).join('')}
    </div>` : '';

  const secObs = itensObs.length ? `
    <div style="margin-top:10px;padding-top:8px;border-top:1px solid var(--border)">
      <div style="font-size:10px;font-family:var(--mono);color:var(--text3);margin-bottom:4px">⚠ REQUER ATENÇÃO</div>
      ${itensObs.map(i => `
        <div class="item-row">
          <span class="item-cod" style="color:var(--danger)">—</span>
          <span class="item-name item-skip">${i.descricao}</span>
          <span style="font-size:10px;color:var(--text3);font-family:var(--mono)">${i.motivo||i.status}</span>
        </div>`).join('')}
    </div>` : '';

  return `
    <div class="pedido-card">
      <div class="pedido-card-header">
        <span class="pedido-card-title">// pedido gerado</span>
        <span class="pedido-card-status ${statusClass}">${statusText}</span>
      </div>
      <div class="pedido-card-body">
        <div class="pedido-row"><span class="pedido-label">nº pedido</span><span class="pedido-value pedido-num">${pedido.numero_pedido}</span></div>
        <div class="pedido-row"><span class="pedido-label">loja</span><span class="pedido-value">${pedido.loja.nome}</span></div>
        <div class="pedido-row"><span class="pedido-label">sistema</span><span class="pedido-value">${pedido.loja.sistema}</span></div>
        <div class="pedido-row"><span class="pedido-label">data / hora</span><span class="pedido-value">${pedido.data} às ${pedido.hora}</span></div>
        <div class="items-list">
          ${itensOk.map(i => linha(i,'var(--ok)')).join('')}
          ${secTroca}
          ${secObs}
        </div>
        <div style="margin-top:10px;display:flex;gap:8px;">
          <button class="btn-icon" onclick="baixarExcel('${pedido.numero_pedido}')">↓ Excel</button>
          <button class="btn-icon" onclick="enviarEmail('${pedido.numero_pedido}')">✉ resumo</button>
        </div>
      </div>
    </div>`;
}

function parseResposta(text) {
  const match = text.match(/<PEDIDO_JSON>([\s\S]*?)<\/PEDIDO_JSON>/);
  if (!match) return { pedido: null, texto: formatText(text) };
  try {
    const pedido = JSON.parse(match[1]);
    const texto  = formatText(text.replace(/<PEDIDO_JSON>[\s\S]*?<\/PEDIDO_JSON>/, '').trim());
    return { pedido, texto };
  } catch { return { pedido: null, texto: formatText(text) }; }
}

function formatText(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.*?)`/g, '<code style="font-family:var(--mono);font-size:12px;background:var(--bg3);padding:1px 5px;border-radius:3px">$1</code>')
    .replace(/^> (.+)$/gm, '<span style="color:var(--warn);font-size:12px;font-family:var(--mono)">$1</span>')
    .replace(/\n/g, '<br>');
}

// ─── ENVIO ────────────────────────────────────────────────────────────────────
async function sendMessage() {
  if (isProcessing) return;
  const input = document.getElementById('msgInput');
  const text  = input.value.trim();
  if (!text && !uploadedFile) return;

  let userContent = text;
  if (uploadedFile) userContent += `\n[Arquivo anexado: ${uploadedFile.name}]`;

  input.value = '';
  autoResize(input);
  removeUpload();
  addMsg('user', formatText(userContent));

  isProcessing = true;
  document.getElementById('sendBtn').disabled = true;
  addTyping();

  try {
    const resposta = await callAgent(userContent);
    removeTyping();
    const { pedido, texto } = parseResposta(resposta);
    if (pedido) salvarPedido(pedido);
    addMsg('agent', texto, pedido ? renderPedidoCard(pedido) : '');
  } catch (e) {
    removeTyping();
    addMsg('agent', `⚠ Erro ao chamar o agente: <strong>${e.message}</strong><br><br>Verifique se o <code>WORKER_URL</code> está configurado corretamente no início do script.`);
  }

  isProcessing = false;
  document.getElementById('sendBtn').disabled = false;
}

// ─── HISTÓRICO & EXPORT ───────────────────────────────────────────────────────
function salvarPedido(pedido) {
  historico.unshift(pedido);
  localStorage.setItem('pedidos_historico', JSON.stringify(historico));
}

function showHistorico() {
  const tbody = document.getElementById('historicoBody');
  tbody.innerHTML = historico.length === 0
    ? '<tr><td colspan="5" style="color:var(--text3);text-align:center;padding:16px">nenhum pedido ainda</td></tr>'
    : historico.map(p => `
        <tr>
          <td>${p.numero_pedido}</td>
          <td>${p.data}</td>
          <td>${p.loja?.nome||'—'}</td>
          <td>${p.loja?.sistema||'—'}</td>
          <td>${p.itens_ok||0} ok · ${p.itens_troca||0} troca</td>
        </tr>`).join('');
  document.getElementById('modalHistorico').classList.add('show');
}

function exportarHistorico() {
  const rows = [['Nº Pedido','Data','Hora','Loja','CNPJ','Sistema','Itens OK','Trocas','Observações']];
  historico.forEach(p => rows.push([p.numero_pedido,p.data,p.hora,p.loja?.nome,p.loja?.cnpj,p.loja?.sistema,p.itens_ok||0,p.itens_troca||0,p.itens_observacao||0]));
  const csv = rows.map(r => r.map(c=>`"${c||''}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));
  a.download = `historico_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function baixarExcel(numPedido) {
  const pedido = historico.find(p => p.numero_pedido === numPedido);
  if (!pedido) return;

  const wb = XLSX.utils.book_new();

  const itensData = [['Nº Pedido','Data','Hora','CNPJ','Nome da Loja','Sistema','Código','Descrição','Quantidade','Unidade','Status','Motivo']];
  pedido.itens.forEach(item => {
    itensData.push([
      pedido.numero_pedido, pedido.data, pedido.hora,
      pedido.loja.cnpj, pedido.loja.nome, pedido.loja.sistema,
      item.codigo||'', item.descricao,
      item.quantidade, item.unidade||'',
      item.status, item.motivo||''
    ]);
  });

  const ws = XLSX.utils.aoa_to_sheet(itensData);
  ws['!cols'] = [{wch:20},{wch:12},{wch:8},{wch:22},{wch:28},{wch:10},{wch:10},{wch:32},{wch:10},{wch:8},{wch:14},{wch:30}];
  XLSX.utils.book_append_sheet(wb, ws, 'Pedido');

  const resumo = [
    ['Campo','Valor'],
    ['Nº Pedido', pedido.numero_pedido],
    ['Data', pedido.data], ['Hora', pedido.hora],
    ['Loja', pedido.loja.nome], ['CNPJ', pedido.loja.cnpj],
    ['Sistema', pedido.loja.sistema],
    ['Itens OK', pedido.itens_ok||0],
    ['Trocas', pedido.itens_troca||0],
    ['Observações', pedido.itens_observacao||0],
  ];
  const wsR = XLSX.utils.aoa_to_sheet(resumo);
  wsR['!cols'] = [{wch:18},{wch:30}];
  XLSX.utils.book_append_sheet(wb, wsR, 'Resumo');

  XLSX.writeFile(wb, `${numPedido}.xlsx`);
}

function enviarEmail(numPedido) {
  const p = historico.find(x => x.numero_pedido === numPedido);
  if (!p) return;
  const body = `Pedido: ${p.numero_pedido}%0D%0AData: ${p.data} às ${p.hora}%0D%0ALoja: ${p.loja.nome}%0D%0ASistema: ${p.loja.sistema}%0D%0AItens OK: ${p.itens_ok||0}%0D%0ATrocas: ${p.itens_troca||0}`;
  window.location.href = `mailto:?subject=Pedido ${p.numero_pedido} - ${p.loja.nome}&body=${body}`;
}

// ─── UTILITÁRIOS ──────────────────────────────────────────────────────────────
function novoPedido() {
  conversationHistory = [];
  document.getElementById('messages').innerHTML = '';
  addMsg('agent', 'Pronto para novo pedido. Cole o texto do WhatsApp aqui.');
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function useHint(text) {
  const input = document.getElementById('msgInput');
  input.value = text; input.focus(); autoResize(input);
}

function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  uploadedFile = file;
  document.getElementById('uploadName').textContent = `📎 ${file.name}`;
  document.getElementById('uploadBar').classList.add('show');
}

function removeUpload() {
  uploadedFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('uploadBar').classList.remove('show');
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }

// ─── INIT ─────────────────────────────────────────────────────────────────────
carregarLojas();
</script>
